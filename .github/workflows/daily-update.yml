name: 每日自动更新金融资讯

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
    # 每周一 UTC 0:00 运行（额外保险）
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: 运行爬虫
        run: python scripts/scraper.py
      
      - name: 更新 HTML
        run: python scripts/update_html.py
      
      - name: 提交并推送更改
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add index.html scripts/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新: $(date +'%Y-%m-%d')" && git push)
